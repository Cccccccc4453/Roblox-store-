<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Market | Secure</title>
    <style>
        :root {
            --primary: #00b2ff;
            --bg: #0a0b0d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --admin-bg: #16181d;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1a1c20 0%, var(--bg) 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
        }

        /* TAB NAVIGATION */
        .nav-tabs {
            display: flex;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            gap: 20px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 99;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            background: none;
            border: 1px solid transparent;
            color: #888;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            padding: 10px 20px;
            transition: 0.3s;
            border-radius: 8px;
        }

        .tab-btn.active {
            color: white;
            background: var(--card-bg);
            border-color: var(--primary);
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none; /* Controlled by JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--admin-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            width: 300px;
        }

        /* VIEWS */
        .content-section { display: none; padding: 40px 20px; }
        .content-section.active { display: block; }

        .admin-card {
            background: var(--admin-bg);
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #444;
        }

        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #000; border: 1px solid #444;
            color: white; border-radius: 8px; box-sizing: border-box;
        }

        .btn-main {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* SHOP */
        .shop-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; max-width: 1200px; margin: 0 auto;
        }

        .item-card {
            background: var(--card-bg); border-radius: 20px; padding: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }

        .item-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        
        .buy-btn {
            display: block; background: var(--primary); color: white;
            padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold;
        }

        .del-btn {
            background: #ff4b4b; border: none; color: white; margin-top: 10px;
            padding: 5px 10px; border-radius: 5px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h3>Admin Login</h3>
            <input type="password" id="passInput" placeholder="Enter Password">
            <button class="btn-main" onclick="verifyPass()">Login</button>
            <button class="tab-btn" onclick="closeLogin()" style="margin-top:10px; width:100%">Cancel</button>
        </div>
    </div>

    <nav class="nav-tabs">
        <button class="tab-btn active" id="btn-shop" onclick="showTab('shop')">🛒 Shop</button>
        <button class="tab-btn" id="btn-admin" onclick="openAdmin()">🛠 Admin</button>
    </nav>

    <section id="view-shop" class="content-section active">
        <h1 style="text-align:center">AERO MARKET</h1>
        <div class="shop-container" id="container-shop"></div>
    </section>

    <section id="view-admin" class="content-section">
        <div class="admin-card">
            <h2>New Listing</h2>
            <input type="text" id="name" placeholder="Item Name">
            <input type="number" id="price" placeholder="Price (Robux)">
            <input type="text" id="img" placeholder="Image URL">
            <input type="text" id="url" placeholder="Roblox Link">
            <button class="btn-main" onclick="addNew()">Add Item</button>
            <button class="tab-btn" onclick="logout()" style="width:100%; margin-top:10px">Logout</button>
        </div>
    </section>

    <script>
        let items = JSON.parse(localStorage.getItem('robuxShop')) || [];
        let loggedIn = false;

        // Initialize shop
        render();

        function openAdmin() {
            if (loggedIn) {
                showTab('admin');
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        }

        function verifyPass() {
            const val = document.getElementById('passInput').value;
            if (val === "Walter") {
                loggedIn = true;
                document.getElementById('login-overlay').style.display = 'none';
                showTab('admin');
                render(); 
            } else {
                alert("Wrong password!");
            }
            document.getElementById('passInput').value = '';
        }

        function closeLogin() {
            document.getElementById('login-overlay').style.display = 'none';
            showTab('shop');
        }

        function showTab(type) {
            document.getElementById('view-shop').classList.remove('active');
            document.getElementById('view-admin').classList.remove('active');
            document.getElementById('btn-shop').classList.remove('active');
            document.getElementById('btn-admin').classList.remove('active');

            if (type === 'shop') {
                document.getElementById('view-shop').classList.add('active');
                document.getElementById('btn-shop').classList.add('active');
            } else {
                document.getElementById('view-admin').classList.add('active');
                document.getElementById('btn-admin').classList.add('active');
            }
        }

        function addNew() {
            const item = {
                id: Date.now(),
                n: document.getElementById('name').value,
                p: document.getElementById('price').value,
                i: document.getElementById('img').value || 'https://via.placeholder.com/150',
                u: document.getElementById('url').value
            };
            if(!item.n || !item.p || !item.u) return alert("Fill everything!");
            items.push(item);
            save();
            showTab('shop');
        }

        function remove(id) {
            items = items.filter(x => x.id !== id);
            save();
        }

        function save() {
            localStorage.setItem('robuxShop', JSON.stringify(items));
            render();
        }

        function logout() {
            loggedIn = false;
            showTab('shop');
            render();
        }

        function render() {
            const div = document.getElementById('container-shop');
            div.innerHTML = '';
            items.forEach(x => {
                div.innerHTML += `
                    <div class="item-card">
                        <img src="${x.i}" class="item-img">
                        <h3>${x.n}</h3>
                        <p style="color:#00e5ff; font-weight:bold">R$ ${x.p}</p>
                        <a href="${x.u}" target="_blank" class="buy-btn">PURCHASE</a>
                        ${loggedIn ? `<button class="del-btn" onclick="remove(${x.id})">Delete</button>` : ''}
                    </div>
                `;
            });
        }
    </script>
</body>
</html>
