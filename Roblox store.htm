<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Market | Live</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00b2ff; --bg: #0a0b0d; --card-bg: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #1a1c20 0%, var(--bg) 100%); color: white; margin: 0; min-height: 100vh; }
        .nav-tabs { display: flex; justify-content: center; background: rgba(0, 0, 0, 0.8); padding: 15px; gap: 20px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 99; backdrop-filter: blur(10px); }
        .tab-btn { background: none; border: 1px solid transparent; color: #888; font-size: 1rem; font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { color: white; background: var(--card-bg); border-color: var(--primary); }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .content-section { display: none; padding: 40px 20px; }
        .content-section.active { display: block; }
        .admin-card { background: #16181d; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 20px; border: 1px solid #444; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .shop-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .item-card { background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .item-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .item-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; background: #222; }
        .buy-btn { display: block; background: var(--primary); color: white; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .del-btn { background: #ff4b4b; border: none; color: white; margin-top: 10px; padding: 5px 10px; border-radius: 5px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="admin-card" style="width:300px">
            <h3>Admin Login</h3>
            <input type="password" id="passInput" placeholder="Password">
            <button class="btn-main" onclick="verifyPass()">Login</button>
            <button class="tab-btn" onclick="closeLogin()" style="margin-top:10px; width:100%">Cancel</button>
        </div>
    </div>

    <nav class="nav-tabs">
        <button class="tab-btn active" id="btn-shop" onclick="showTab('shop')">🛒 Storefront</button>
        <button class="tab-btn" id="btn-admin" onclick="openAdmin()">🛠 Admin</button>
    </nav>

    <section id="view-shop" class="content-section active">
        <h1 style="text-align:center">AERO MARKET</h1>
        <div class="shop-container" id="container-shop">Loading live items...</div>
    </section>

    <section id="view-admin" class="content-section">
        <div class="admin-card">
            <h2>List New Item</h2>
            <input type="text" id="name" placeholder="Item Name (e.g. Red Cape)">
            <input type="number" id="price" placeholder="Price (Robux)">
            <input type="text" id="img" placeholder="Image URL (Right-click image > Copy link)">
            <input type="text" id="url" placeholder="Roblox Purchase Link">
            <button class="btn-main" onclick="addNew()">POST TO DATABASE</button>
        </div>
    </section>

    <script>
        // --- YOUR UNIQUE DATABASE CONFIG ---
        const SB_URL = 'https://hiyildkljjubspiykttg.supabase.co'; 
        const SB_KEY = 'sb_publishable_Ekdlw6wahM8lj1clTpNQ5Q_CQggd9cc';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let isAdmin = false;

        loadData();

        async function loadData() {
            const { data, error } = await _supabase.from('items').select('*');
            if (error) {
                console.error(error);
                document.getElementById('container-shop').innerText = "Check Supabase Policies!";
            } else {
                render(data);
            }
        }

        async function addNew() {
            const newItem = {
                name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value),
                image_url: document.getElementById('img').value,
                roblox_url: document.getElementById('url').value
            };

            if(!newItem.name || !newItem.price) return alert("Fill Name and Price!");

            const { error } = await _supabase.from('items').insert([newItem]);
            if (error) alert("Error: " + error.message);
            else {
                alert("Live! Anyone visiting the site can see this now.");
                loadData();
                showTab('shop');
                // Clear fields
                document.getElementById('name').value = '';
                document.getElementById('price').value = '';
                document.getElementById('img').value = '';
                document.getElementById('url').value = '';
            }
        }

        async function remove(id) {
            if(!confirm("Delete this forever?")) return;
            const { error } = await _supabase.from('items').delete().eq('id', id);
            if (!error) loadData();
        }

        function render(list) {
            const div = document.getElementById('container-shop');
            if(list.length === 0) div.innerHTML = "<p>No items in stock. Go to Admin to add some!</p>";
            else {
                div.innerHTML = '';
                list.forEach(item => {
                    div.innerHTML += `
                        <div class="item-card">
                            <img src="${item.image_url}" class="item-img" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                            <h3>${item.name}</h3>
                            <p style="color:#00e5ff; font-weight:bold; font-size: 1.2rem;">R$ ${item.price}</p>
                            <a href="${item.roblox_url}" target="_blank" class="buy-btn">PURCHASE</a>
                            ${isAdmin ? `<button class="del-btn" onclick="remove(${item.id})">Delete Item</button>` : ''}
                        </div>
                    `;
                });
            }
        }

        function openAdmin() { if(isAdmin) showTab('admin'); else document.getElementById('login-overlay').style.display = 'flex'; }
        
        function verifyPass() {
            if(document.getElementById('passInput').value === "Walter") {
                isAdmin = true;
                document.getElementById('login-overlay').style.display = 'none';
                showTab('admin');
                loadData();
            } else { alert("Incorrect Password"); }
        }

        function closeLogin() { document.getElementById('login-overlay').style.display = 'none'; }

        function showTab(t) {
            document.getElementById('view-shop').classList.toggle('active', t === 'shop');
            document.getElementById('view-admin').classList.toggle('active', t === 'admin');
            document.getElementById('btn-shop').classList.toggle('active', t === 'shop');
            document.getElementById('btn-admin').classList.toggle('active', t === 'admin');
        }
    </script>
</body>
</html>
