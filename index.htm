<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aero Market | Models</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #00b2ff; --bg: #0a0b0d; --card-bg: rgba(255, 255, 255, 0.05); --edit: #ffa500; --announcement: #ffcc00; --danger: #ff4b4b; }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #1a1c20 0%, var(--bg) 100%); color: white; margin: 0; min-height: 100vh; }
        
        /* Global Maintenance Screen */
        #maint-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .secret-door { margin-top: 50px; background: none; border: none; color: #111; cursor: pointer; font-size: 1.2rem; }

        /* Bars & Nav */
        #announcement-bar { background: var(--announcement); color: black; text-align: center; padding: 12px; font-weight: 800; display: none; position: sticky; top: 0; z-index: 101; text-transform: uppercase; border-bottom: 2px solid rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; justify-content: center; background: rgba(0, 0, 0, 0.9); padding: 15px; gap: 20px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 99; backdrop-filter: blur(10px); }
        #announcement-bar ~ .nav-tabs { top: 45px; } /* Moves nav down if bar is active */

        .tab-btn { background: none; border: 1px solid transparent; color: #888; font-size: 1rem; font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { color: white; background: var(--card-bg); border-color: var(--primary); }
        
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Content */
        .content-section { display: none; padding: 40px 20px; }
        .content-section.active { display: block; }
        
        .admin-card { background: #16181d; max-width: 550px; margin: 0 auto 20px auto; padding: 30px; border-radius: 20px; border: 1px solid #444; }
        .admin-card h2 { margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        
        input, textarea, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-main:active { transform: scale(0.98); }

        /* Shop Layout */
        .section-title { text-align: left; max-width: 1200px; margin: 40px auto 20px; border-left: 5px solid var(--primary); padding-left: 15px; }
        .shop-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto 50px; }
        .item-card { background: var(--card-bg); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .item-img { width: 100%; height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
        .buy-btn { display: block; background: var(--primary); color: white; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        
        .admin-controls { display: flex; gap: 10px; margin-top: 15px; }
        .edit-btn { background: var(--edit); border: none; padding: 8px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; flex: 1; }
        .del-btn { background: var(--danger); border: none; padding: 8px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

    <div id="maint-screen">
        <h1 style="color: var(--danger);">🛠 UNDER MAINTENANCE</h1>
        <p>Aero Market is being updated for a better experience.</p>
        <button class="secret-door" onclick="document.getElementById('login-overlay').style.display='flex'">🔒</button>
    </div>

    <div id="announcement-bar"></div>

    <div id="login-overlay">
        <div class="admin-card" style="width:320px">
            <h3>Admin Login</h3>
            <input type="password" id="passInput" placeholder="Password">
            <button class="btn-main" onclick="verifyPass()">Login</button>
            <button onclick="closeLogin()" class="tab-btn" style="width:100%; margin-top:10px;">Close</button>
        </div>
    </div>

    <nav class="nav-tabs">
        <button class="tab-btn active" id="btn-shop" onclick="showTab('shop')">🛒 Storefront</button>
        <button class="tab-btn" id="btn-admin" onclick="openAdmin()">🛠 Admin Panel</button>
    </nav>

    <section id="view-shop" class="content-section active">
        <h1 style="text-align:center; letter-spacing: 3px;">AERO MARKET</h1>
        <h2 class="section-title">🏎️ CAR MODELS</h2>
        <div class="shop-container" id="cars-container"></div>
        <h2 class="section-title">🏁 TRACK MODELS</h2>
        <div class="shop-container" id="tracks-container"></div>
    </section>

    <section id="view-admin" class="content-section">
        
        <div class="admin-card" style="border-color: var(--announcement);">
            <h2>📢 Shop Announcement</h2>
            <textarea id="announcement-text" placeholder="Enter message for the yellow bar..." rows="2"></textarea>
            <button class="btn-main" style="background:var(--announcement); color:black;" onclick="updateAnnouncement()">PUBLISH ANNOUNCEMENT</button>
            <button class="tab-btn" style="width:100%; margin-top:8px;" onclick="clearAnnouncement()">Clear Bar</button>
        </div>

        <div class="admin-card" style="border-color: var(--danger);">
            <h2>⚠️ Maintenance Mode</h2>
            <p>Current Status: <b id="maint-status">LOADING...</b></p>
            <button class="btn-main" style="background:var(--danger);" onclick="toggleMaint()">TOGGLE MAINTENANCE</button>
            <p style="font-size: 0.8rem; color: #888; margin-top: 10px;">When ON, only you can see the shop.</p>
        </div>

        <div class="admin-card">
            <h2 id="admin-title">📦 Add New Model</h2>
            <select id="category">
                <option value="car">Car Model</option>
                <option value="track">Track Model</option>
            </select>
            <input type="text" id="name" placeholder="Item Name">
            <input type="number" id="price" placeholder="Price (Robux)">
            <input type="text" id="img" placeholder="Image URL">
            <input type="text" id="url" placeholder="Roblox Link">
            <button class="btn-main" id="save-btn" onclick="handleSave()">POST TO DATABASE</button>
            <button id="cancel-edit" class="tab-btn" style="display:none; width:100%; margin-top:10px;" onclick="resetForm()">Cancel Edit</button>
        </div>
    </section>

    <script>
        const SB_URL = 'https://hiyildkljjubspiykttg.supabase.co'; 
        const SB_KEY = 'sb_publishable_Ekdlw6wahM8lj1clTpNQ5Q_CQggd9cc';
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        let isAdmin = false, editID = null, isMaint = false;

        // Initialize
        loadData(); loadAnnouncement(); checkMaint();

        // --- DATABASE FETCH ---
        async function loadData() {
            const { data } = await _supabase.from('items').select('*').order('created_at', { ascending: false });
            if (data) render(data);
        }

        async function loadAnnouncement() {
            const { data } = await _supabase.from('announcements').select('content').eq('id', 1).single();
            const bar = document.getElementById('announcement-bar');
            if (data?.content && data.content.trim() !== "") { 
                bar.innerText = "📣 " + data.content;
                bar.style.display = "block";
            } else { bar.style.display = "none"; }
        }

        async function checkMaint() {
            const { data } = await _supabase.from('announcements').select('content').eq('id', 999).single();
            isMaint = data?.content === "TRUE";
            document.getElementById('maint-status').innerText = isMaint ? "ON (PUBLIC BLOCKED)" : "OFF (PUBLIC VISIBLE)";
            document.getElementById('maint-status').style.color = isMaint ? "var(--danger)" : "#00ff00";
            
            if (isMaint && !isAdmin) document.getElementById('maint-screen').style.display = 'flex';
            else document.getElementById('maint-screen').style.display = 'none';
        }

        // --- ADMIN ACTIONS ---
        async function updateAnnouncement() {
            const msg = document.getElementById('announcement-text').value;
            await _supabase.from('announcements').upsert({ id: 1, content: msg });
            alert("Announcement Live!"); loadAnnouncement();
        }

        async function clearAnnouncement() {
            await _supabase.from('announcements').update({ content: "" }).eq('id', 1);
            document.getElementById('announcement-text').value = "";
            loadAnnouncement();
        }

        async function toggleMaint() {
            const newState = isMaint ? "FALSE" : "TRUE";
            await _supabase.from('announcements').upsert({ id: 999, content: newState });
            checkMaint();
        }

        async function handleSave() {
            const itemData = {
                name: document.getElementById('name').value,
                price: parseInt(document.getElementById('price').value),
                image_url: document.getElementById('img').value,
                roblox_url: document.getElementById('url').value,
                category: document.getElementById('category').value
            };
            if(!itemData.name || !itemData.price) return alert("Fill Name and Price!");

            if (editID) {
                await _supabase.from('items').update(itemData).eq('id', editID);
                alert("Updated!");
            } else {
                await _supabase.from('items').insert([itemData]);
                alert("Posted!");
            }
            resetForm(); loadData(); showTab('shop');
        }

        function startEdit(id, name, price, img, url, cat) {
            editID = id;
            document.getElementById('name').value = name;
            document.getElementById('price').value = price;
            document.getElementById('img').value = img;
            document.getElementById('url').value = url;
            document.getElementById('category').value = cat || 'car';
            document.getElementById('admin-title').innerText = "Editing: " + name;
            document.getElementById('save-btn').innerText = "SAVE CHANGES";
            document.getElementById('cancel-edit').style.display = "block";
            showTab('admin');
        }

        function resetForm() {
            editID = null;
            document.getElementById('name').value = '';
            document.getElementById('price').value = '';
            document.getElementById('img').value = '';
            document.getElementById('url').value = '';
            document.getElementById('admin-title').innerText = "📦 Add New Model";
            document.getElementById('save-btn').innerText = "POST TO DATABASE";
            document.getElementById('cancel-edit').style.display = "none";
        }

        async function remove(id) { if(confirm("Delete forever?")) { await _supabase.from('items').delete().eq('id',id); loadData(); } }

        // --- UI LOGIC ---
        function render(list) {
            const carDiv = document.getElementById('cars-container');
            const trackDiv = document.getElementById('tracks-container');
            carDiv.innerHTML = ''; trackDiv.innerHTML = '';
            
            list.forEach(item => {
                const card = `
                <div class="item-card">
                    <img src="${item.image_url}" class="item-img" onerror="this.src='https://via.placeholder.com/200?text=No+Image'">
                    <h3>${item.name}</h3>
                    <p style="color:var(--primary); font-weight:bold;">R$ ${item.price}</p>
                    <a href="${item.roblox_url}" target="_blank" class="buy-btn">PURCHASE</a>
                    ${isAdmin ? `<div class="admin-controls">
                        <button class="edit-btn" onclick="startEdit(${item.id},'${item.name}',${item.price},'${item.image_url}','${item.roblox_url}','${item.category}')">Edit</button>
                        <button class="del-btn" onclick="remove(${item.id})">Delete</button>
                    </div>` : ''}
                </div>`;
                if (item.category === 'track') trackDiv.innerHTML += card;
                else carDiv.innerHTML += card;
            });
        }

        function openAdmin() { if(isAdmin) showTab('admin'); else document.getElementById('login-overlay').style.display='flex'; }
        
        function verifyPass() {
            if(document.getElementById('passInput').value === "Walter") {
                isAdmin = true; 
                document.getElementById('login-overlay').style.display='none'; 
                checkMaint(); loadData(); showTab('admin');
            } else alert("Incorrect Password!");
        }

        function closeLogin() { document.getElementById('login-overlay').style.display='none'; }

        function showTab(t) {
            document.getElementById('view-shop').classList.toggle('active', t==='shop');
            document.getElementById('view-admin').classList.toggle('active', t==='admin');
            document.getElementById('btn-shop').classList.toggle('active', t==='shop');
            document.getElementById('btn-admin').classList.toggle('active', t==='admin');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
